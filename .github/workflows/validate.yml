name: Validate

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: plugin

  lint:
    name: Lint (JSON & files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate hacs.json
        run: |
          python3 -c "import json,sys; json.load(open('hacs.json')); print('hacs.json OK')"

      - name: Ensure plugin JS exists
        run: |
          FILE=$(python3 -c "import json;print(json.load(open('hacs.json'))['filename'])")
          test -f "$FILE" && echo "Found plugin file: $FILE"
